name: Copilot Auto Review

on:
  # pull_request_target を使用する理由:
  # pull_request ではフォーク PR の GITHUB_TOKEN が読み取り専用になり
  # --add-reviewer が失敗する。このワークフローは PR コードを
  # チェックアウト・実行しないため、pull_request_target を使っても安全。
  pull_request_target:
    types: [opened, reopened, synchronize]

concurrency:
  # 同一PRの実行を直列化し TOCTOU を防ぐ。後発ジョブは前の完了を待つ。
  group: copilot-review-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  request-copilot-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Request Copilot review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          # 常に --add-reviewer を実行する。
          # コミット追加（synchronize）後は GitHub が保留中レビューを dismissed にするが
          # reviewRequests からは削除しないため、「すでに依頼済み」チェックでは
          # 再リクエストの要否を正しく判定できない。
          # Copilot がすでにレビュー待ちの場合 422 が返ることがあるが || true で無視する。
          gh pr edit "$PR" --repo "$REPO" \
            --add-reviewer "copilot-pull-request-reviewer" || true
