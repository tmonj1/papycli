name: Copilot Review

on:
  pull_request:
    types:
      # opened は除外する。PR 作成時はリポジトリ設定により Copilot レビューが
      # 自動実行されるため、ここでリクエストすると二重実行になる。
      - synchronize

# このワークフローを動作させるには、以下の設定が必要:
# 1. Copilot コードレビューがリポジトリで有効になっていること
#    (Settings → Copilot → Code review)
# 2. Copilot が有効なユーザーの Personal Access Token (classic, repo スコープ) を
#    リポジトリシークレット GH_PAT に設定すること
#    (GITHUB_TOKEN は Copilot 権限を持たないため 422 エラーになる)
#
# 注意: 個人リポジトリでは Copilot Code Review を有効にしても
# copilot-pull-request-reviewer が Outside Collaborator として自動登録されない。
# そのため、最初のレビューリクエスト時にこのワークフローが自動で登録する。
permissions: {}

# 同一 PR への連続プッシュで多重実行されないよう PR 番号単位で直列化する。
# cancel-in-progress: true にすることで古い実行をキャンセルし最新のみを実行する。
concurrency:
  group: copilot-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  request-copilot-review:
    name: Request Copilot review
    runs-on: ubuntu-latest
    # fork からの PR ではシークレットが利用できないためスキップする。
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Request review from Copilot
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # 個人リポジトリでは Copilot Code Review を有効にしても
          # copilot-pull-request-reviewer が Outside Collaborator として自動登録されないため、
          # reviewer request API が "not a collaborator" (HTTP 422) を返す。
          # GET /collaborators/{username} は 204 (存在) または 404 (不在) を返す。
          if ! gh api \
              repos/${{ github.repository }}/collaborators/copilot-pull-request-reviewer \
              --silent 2>/dev/null; then
            echo "Adding copilot-pull-request-reviewer as an outside collaborator..."
            gh api --method PUT \
              repos/${{ github.repository }}/collaborators/copilot-pull-request-reviewer \
              -f permission=read \
              || { echo "Warning: Failed to add copilot-pull-request-reviewer as collaborator." >&2; }
          fi
          # すでにレビューリクエスト済みの場合は一度削除してから再リクエストする。
          # 削除→再追加することで、新しいコミットがプッシュされたときも Copilot が再レビューを行う。
          already_requested=$(gh api \
            repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/requested_reviewers \
            --jq '[.users[].login] | contains(["copilot-pull-request-reviewer"])' \
            || { echo "Warning: failed to fetch existing Copilot review requests via gh api; treating as not yet requested." >&2; echo "false"; })
          if [ "$already_requested" = "true" ]; then
            echo "Copilot is already a requested reviewer; removing to trigger re-review."
            gh api --method DELETE \
              repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/requested_reviewers \
              -f 'reviewers[]=copilot-pull-request-reviewer' || { echo "Warning: Failed to remove existing Copilot review request; continuing to request review." >&2; }
          fi
          if ! gh api --method POST \
              repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/requested_reviewers \
              -f 'reviewers[]=copilot-pull-request-reviewer'; then
            echo "Failed to request Copilot review." \
              "Ensure Copilot code review is enabled for this repository."
          fi
