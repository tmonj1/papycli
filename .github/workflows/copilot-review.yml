name: Copilot Auto Review

on:
  # pull_request_target を使用する理由:
  # pull_request ではフォーク PR の GITHUB_TOKEN が読み取り専用になり
  # --add-reviewer が失敗する。このワークフローは PR コードを
  # チェックアウト・実行しないため、pull_request_target を使っても安全。
  pull_request_target:
    types: [opened, reopened, synchronize]

concurrency:
  # 同一PRの実行を直列化し TOCTOU を防ぐ。後発ジョブは前の完了を待つ。
  group: copilot-review-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  request-copilot-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Request Copilot review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          # remove → add の順で実行し、確実に新たなリクエストイベントを発行する。
          # synchronize 後、GitHub は Copilot を reviewRequests に残したまま dismissed にする。
          # この状態で --add-reviewer だけを呼ぶと 422 が返り新たなイベントが発行されない。
          # 一度 remove してから add することで Copilot のレビューを確実に再起動する。
          #
          # remove: Copilot がリクエストされていない場合（opened 直後等）はエラーになるが無視する。
          #         認証・権限エラーは次の add ステップで検出できるため、ここでは || true とする。
          gh pr edit "$PR" --repo "$REPO" \
            --remove-reviewer "copilot-pull-request-reviewer" 2>/dev/null || true
          # add: エラーはすべてジョブ失敗とする（設定ミス・権限不足等を検出するため）。
          gh pr edit "$PR" --repo "$REPO" \
            --add-reviewer "copilot-pull-request-reviewer"
