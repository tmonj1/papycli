name: Copilot Review

on:
  pull_request:
    types:
      # opened は除外する。PR 作成時はリポジトリ設定により Copilot レビューが
      # 自動実行されるため、ここでリクエストすると二重実行になる。
      - synchronize

# このワークフローを動作させるには、リポジトリの以下の設定を有効にする必要がある:
#   Settings → Actions → General → Workflow permissions
#   ☑ Allow GitHub Actions to create and approve pull requests
permissions:
  pull-requests: write

# 同一 PR への連続プッシュで多重実行されないよう PR 番号単位で直列化する。
# cancel-in-progress: true にすることで古い実行をキャンセルし最新のみを実行する。
concurrency:
  group: copilot-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  request-copilot-review:
    name: Request Copilot review
    runs-on: ubuntu-latest
    # fork からの PR は GITHUB_TOKEN の書き込み権限がなく 403 になるためスキップする。
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Request review from Copilot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # すでにレビューリクエスト済みの場合は一度削除してから再リクエストする。
          # 削除→再追加することで、新しいコミットがプッシュされたときも Copilot が再レビューを行う。
          already_requested=$(gh api \
            repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/requested_reviewers \
            --jq '[.users[].login] | contains(["copilot-pull-request-reviewer"])' \
            || { echo "Warning: failed to fetch existing Copilot review requests via gh api; treating as not yet requested." >&2; echo "false"; })
          if [ "$already_requested" = "true" ]; then
            echo "Copilot is already a requested reviewer; removing to trigger re-review."
            gh api --method DELETE \
              repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/requested_reviewers \
              -f 'reviewers[]=copilot-pull-request-reviewer' || true
          fi
          if ! gh api --method POST \
              repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/requested_reviewers \
              -f 'reviewers[]=copilot-pull-request-reviewer'; then
            echo "Failed to request Copilot review." \
              "Ensure Copilot code review is enabled for this repository."
          fi
