name: Release Please

on:
  push:
    branches:
      - main

# このワークフローを動作させるには、リポジトリの以下の設定を有効にする必要がある:
#   Settings → Actions → General → Workflow permissions
#   ☑ Allow GitHub Actions to create and approve pull requests
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    # このジョブは main への push のたびに実行され、マージされた PR の種類に応じて動作が変わる:
    #   - 通常の PR がマージされた場合: リリース PR を作成または更新する
    #   - release-please が作成したリリース PR がマージされた場合: GitHub Release を作成し、
    #     バージョンタグ (例: v1.0.0) を付与する
    # つまり「PR 作成」と「タグ付与＋リリース作成」の両方をこの1ステップが担う。
    name: Create release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    # release-please が GitHub Release を作成したときのみ実行する。
    # NOTE: release-please は GITHUB_TOKEN で Release を作成するため、
    #       release: published イベントでは他のワークフローがトリガーされない
    #       (GitHub Actions の仕様)。そのため PyPI 公開はこの同一ワークフロー内で行う。
    name: Build and publish to PyPI
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v5

      - name: Build wheel and sdist
        run: uv build

      - name: Upload dist assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/* --clobber

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
