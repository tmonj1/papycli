site_name: papycli
site_description: Python CLI for OpenAPI 3.0 REST APIs
site_url: https://tmonj1.github.io/papycli/
repo_url: https://github.com/tmonj1/papycli
repo_name: tmonj1/papycli
docs_dir: manual
edit_uri: edit/main/manual/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Reference: reference.md
  - Plugins: plugins.md
  - Development: development.md
  - 日本語:
    - ホーム: ja/index.md
    - インストール: ja/installation.md
    - クイックスタート: ja/quickstart.md
    - リファレンス: ja/reference.md
    - プラグイン: ja/plugins.md
    - 開発: ja/development.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
